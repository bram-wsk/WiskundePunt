
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="WiskundePunt">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <title>WiskundePunt V13</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #e2e8f0;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px), radial-gradient(#cbd5e1 1px, #e2e8f0 1px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: #1e293b;
            min-height: 100vh;
        }

        button, 
        [role="button"],
        .cursor-pointer,
        input[type="submit"],
        a {
            cursor: pointer !important;
            pointer-events: auto !important;
            user-select: none;
            -webkit-user-select: none;
        }

        .card-shadow {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.12), 0 10px 20px -10px rgba(0, 0, 0, 0.08);
        }

        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .animate-bounce-subtle {
            animation: bounce-subtle 2s infinite ease-in-out;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 99999;
            top: -10px;
            animation: confetti-fall 4s linear forwards;
        }

        math-field {
            font-size: 1.8rem;
            padding: 0 16px; /* Padding boven/onder verwijderd voor verticale centrering via flex */
            border: none;
            background: transparent !important;
            color: #1e293b !important;
            width: 100%;
            height: 100%; 
            min-height: 50px;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: text !important;
        }
        
        /* FIX VOOR VERTICALE UITLIJNING VAN TEKST IN MATH-FIELD */
        math-field::part(content) {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* VERBERG ALLE MATHLIVE CONTROLS VOLLEDIG */
        math-field::part(virtual-keyboard-toggle),
        math-field::part(menu-toggle),
        math-field::part(notification-toggle) {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 0 !important;
            height: 0 !important;
            position: absolute !important;
        }

        /* Zorg dat het interne invoerveld de hele ruimte pakt */
        math-field::part(container) {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
        }

        /* Verberg de 'placeholder' die soms als ghost button fungeert */
        math-field::part(placeholder) {
            color: #cbd5e1;
            opacity: 0.6;
        }

        .ml-keyboard-container {
            display: none !important;
            z-index: -1 !important;
            pointer-events: none !important;
        }

        /* PRINT STYLES */
        @media print {
            /* 1. Reset Body: ensure full width/height and white background */
            body {
                background: white !important;
                background-image: none !important;
                height: auto !important;
                width: 100% !important;
                overflow: visible !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            /* 2. Hide ALL direct children of body EXCEPT #printable-area */
            body > *:not(#printable-area) {
                display: none !important;
            }

            /* 3. Style and position the #printable-area */
            #printable-area {
                display: block !important;
                visibility: visible !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
                margin: 0 !important;
                padding: 20px !important;
                z-index: 99999 !important;
                background: white !important;
                color: black !important;
                opacity: 1 !important;
            }

            /* 4. Ensure everything inside printable area is visible */
            #printable-area * {
                visibility: visible !important;
                /* Override Tailwind's .hidden if necessary, but carefully */
            }
            
            /* Helper to un-hide specific elements during print if they have .hidden class */
            #printable-area .hidden {
                display: block !important;
            }

            /* Utilities */
            .no-print {
                display: none !important;
            }
            
            .break-inside-avoid {
                page-break-inside: avoid;
            }

            /* Remove shadows for print */
            * {
                box-shadow: none !important;
                text-shadow: none !important;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",

    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
  }
}
</script>

</head>

</html>
